project:
  name: "Video Note Generator"
  language: "hu"

input:
  video_extensions: [".mp4", ".webm", ".mkv", ".mov"]
  subtitle_extensions: [".srt", ".vtt"]

parser:
  encoding: "utf-8"

cleaner:
  remove_fillers: true
  merge_blocks: true
  merge_gap_ms: 2000
  min_words_per_block: 2
  max_noise_words: 4

chapters:
  min_chapters: 15
  max_chapters: 40
  chunk_duration_minutes: 15
  max_words_per_segment: 250
  gap_threshold_seconds: 20
  method: heuristic

ai:
  provider: mistral
  model: mistral-small-latest
  temperature: 0.3
  max_tokens: 4000

screenshots:
  format: png
  width: 1280
  dedup_threshold_seconds: 30

markdown:
  obsidian_wikilinks: true
  include_practice: true
  include_keywords: true

output:
  directory: "output"
